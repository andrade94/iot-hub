<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <rect width="1200" height="600" fill="#f1f3f7"/>
  <!-- Grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#dfe3ea" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#grid)"/>
  <!-- Rooms -->
  <rect x="30" y="30" width="330" height="240" rx="8" fill="#fff" stroke="#c9d1db" stroke-width="2"/>
  <text x="195" y="155" text-anchor="middle" font-family="monospace" font-size="12" fill="#9ca3af">COOLER A</text>
  <rect x="380" y="30" width="240" height="240" rx="8" fill="#fff" stroke="#c9d1db" stroke-width="2"/>
  <text x="500" y="155" text-anchor="middle" font-family="monospace" font-size="12" fill="#9ca3af">COOLER B</text>
  <rect x="640" y="30" width="530" height="240" rx="8" fill="#e8f4ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="905" y="155" text-anchor="middle" font-family="monospace" font-size="12" fill="#60a5fa">FREEZER</text>
  <rect x="30" y="310" width="270" height="260" rx="8" fill="#fff8f0" stroke="#fed7aa" stroke-width="2"/>
  <text x="165" y="445" text-anchor="middle" font-family="monospace" font-size="12" fill="#f59e0b">KITCHEN</text>
  <rect x="320" y="310" width="240" height="260" rx="8" fill="#f0f0f0" stroke="#c9d1db" stroke-width="2"/>
  <text x="440" y="445" text-anchor="middle" font-family="monospace" font-size="12" fill="#9ca3af">COMPRESSOR 1</text>
  <rect x="580" y="310" width="240" height="260" rx="8" fill="#f0f0f0" stroke="#c9d1db" stroke-width="2"/>
  <text x="700" y="445" text-anchor="middle" font-family="monospace" font-size="12" fill="#9ca3af">COMPRESSOR 2</text>
  <rect x="840" y="310" width="330" height="260" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="1005" y="445" text-anchor="middle" font-family="monospace" font-size="12" fill="#10b981">OFFICE</text>
  <!-- Vitrina (display case in corridor) -->
  <rect x="380" y="280" width="240" height="20" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="500" y="293" text-anchor="middle" font-family="monospace" font-size="9" fill="#d97706">VITRINA 1</text>
</svg>
